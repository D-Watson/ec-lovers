version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ec-lovers-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ec_lovers
      POSTGRES_PASSWORD: ec_lovers_dev
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec_lovers -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: